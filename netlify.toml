[build]
  base = "frontend"
  # Força Rollup a usar implementação JS para evitar falhas de optional deps (@rollup/rollup-*)
  command = "ROLLUP_SKIP_NODEJS_NATIVE=true npm ci && ROLLUP_SKIP_NODEJS_NATIVE=true npm run build"
  # publish é relativo ao base
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Defina VITE_API_URL na UI da Netlify apontando para o backend em produção
  # VITE_API_URL = "https://seu-backend.example.com"
  # Workaround para bug do npm com optional deps do Rollup em ambientes Linux x64
  ROLLUP_SKIP_NODEJS_NATIVE = "true"
