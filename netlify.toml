[build]
  # Build diretamente no subprojeto, sem depender de base
  command = "ROLLUP_SKIP_NODEJS_NATIVE=true npm --prefix frontend ci && ROLLUP_SKIP_NODEJS_NATIVE=true npm --prefix frontend run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"
  # Defina VITE_API_URL na UI da Netlify apontando para o backend em produção
  # VITE_API_URL = "https://seu-backend.example.com"
  # Workaround para bug do npm com optional deps do Rollup em ambientes Linux x64
  ROLLUP_SKIP_NODEJS_NATIVE = "true"
