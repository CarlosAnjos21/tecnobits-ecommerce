services:
  - type: web
    name: tecnobits-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && cd backend && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        # Ajuste após criar o site na Netlify (ex.: https://seu-site.netlify.app)
        value: https://tecnobits.netlify.app
      - key: DATABASE_URL
        fromDatabase:
          name: tecnobits-db
          property: connectionString

databases:
  - name: tecnobits-db
    plan: free
    region: oregon
